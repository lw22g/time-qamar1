<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جهاز غير مصرح به | نظام الحضور والانصراف</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div style="position: absolute; top: 20px; left: 20px;">
      <button id="theme-toggle-btn" class="theme-toggle-btn">☀️ المظهر الفاتح</button>
    </div>
    <div class="glass-card auth-card">
      <div class="auth-header">
        <div class="logo-section" style="justify-content: center; margin-bottom: 20px;">
          <div class="logo-icon">🔒</div>
          <div class="logo-text">نظام الحضور والانصراف</div>
        </div>
        <h1>جهاز غير مصرح به!</h1>
        <p>عذراً، هذا الجهاز ليس من حواسيب الشركة المعتمدة لتشغيل هذا النظام.</p>
      </div>

      <div id="status-info" style="text-align: center; margin-bottom: 20px; color: var(--text-secondary); font-size: 14px;">
        جاري تحميل حالة ترخيص الأجهزة...
      </div>

      <form id="auth-device-form" style="display: none;">
        <div class="form-group">
          <label for="device-name">اسم هذا الحاسوب (مثال: حاسوب الاستقبال):</label>
          <input type="text" id="device-name" class="form-control" placeholder="أدخل اسماً مميزاً للجهاز" required>
        </div>
        <div class="form-group">
          <label for="admin-password">رمز مرور المدير لتفويض هذا الجهاز:</label>
          <input type="password" id="admin-password" class="form-control" placeholder="رمز مرور المدير" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">تفويض هذا الجهاز</button>
      </form>

      <div id="max-reached-message" style="display: none; text-align: center; color: var(--danger); padding: 15px; border: 1px dashed rgba(239, 68, 68, 0.3); border-radius: var(--radius-md); background: rgba(239, 68, 68, 0.05);">
        ⚠️ تم الوصول للحد الأقصى للأجهزة المصرح بها (3 أجهزة). 
        <br><br>
        <span style="font-size: 13px; color: var(--text-secondary);">
          يرجى الطلب من المدير إلغاء تصريح أحد الأجهزة القديمة من لوحة التحكم لإضافة هذا الجهاز.
        </span>
      </div>
    </div>
  </div>

  <div id="toast-el" class="toast">
    <span id="toast-text"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase_client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkDeviceStatus();
    });
  </script>
</body>
</html>
